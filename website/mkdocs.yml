site_name: Corpus
site_description: A personal knowledge base that tends itself — sources in, cited pages out.
site_url: https://joaoblasques.com/corpus/
repo_url: https://github.com/joaoblasques/corpus
repo_name: corpus

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Light mode
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - toc.follow
  icon:
    logo: corpus/leaf

nav:
  - Home: index.md
  - The Idea: the-idea.md
  - How It Works: how-it-works.md
  - Collectors: collectors.md
  - The Custodian: the-custodian.md
  - Under the Hood: under-the-hood.md
  - Getting Started: getting-started.md
  - Using It Well: using-it-well.md
  - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search
  - macros:
      module_name: hooks/site_stats

hooks:
  - hooks/corpus_graph.py

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js
  - assets/graph.js
