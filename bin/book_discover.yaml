# Discovery config for book_discover.py — scans ONE curated legal index and proposes
# corpus-relevant PDF books for review. Never an open-web crawler.
index_urls:
  - https://raw.githubusercontent.com/EbookFoundation/free-programming-books/main/books/free-programming-books-subjects.md

# A book entry is proposed only if its section heading contains one of these (case-insensitive).
relevant_sections:
  - machine learning
  - deep learning
  - artificial intelligence
  - data science
  - data mining
  - databases
  - sql
  - distributed
  - operating systems
  - cloud
  - software architecture
  - python
  - statistics
  - algorithms
  - mlops

max_new_per_run: 15
