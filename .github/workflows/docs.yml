name: Deploy docs

# Rebuild the site (which regenerates the knowledge graph + live stats from the corpus)
# and redeploy it to the public Pages repo on every push to main — so the graph stays
# current as the corpus grows (incl. the nightly auto-ingest commits).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -r website/requirements.txt
      - name: Build (regenerates graph-data.json + live stats)
        run: cd website && mkdocs build --strict
      - name: Publish to gh-pages on this repo
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd website/site
          touch .nojekyll
          git init -q && git checkout -q -b gh-pages && git add -A
          git -c user.email=ci@corpus -c user.name=corpus-ci commit -q -m "deploy: ${GITHUB_SHA::7}"
          git push -fq "https://x-access-token:${TOKEN}@github.com/joaoblasques/corpus.git" gh-pages
          echo "::notice::Deployed to https://joaoblasques.com/corpus/"
